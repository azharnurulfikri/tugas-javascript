<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Manajemen Toko</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        margin: 0;
        background-image: url("background.jpg");
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        background-attachment: fixed;
      }

      h2 {
        color: #333;
        text-align: center;
        margin-bottom: 25px;
        text-shadow: 1px 1px 2px white;
      }

      .container {
        max-width: 900px;
        margin: 40px auto;
        background: rgba(255, 255, 255, 0.9);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(5px);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: white;
      }

      th, td {
        padding: 15px;
        border: 1px solid #eee;
        text-align: left;
      }

      th {
        background-color: #343a40;
        color: white;
        text-transform: uppercase;
      }

      tr:nth-child(even) { background-color: #f8f9fa; }
      tr:hover { background-color: #f1f1f1; }

      .btn-group {
        margin-bottom: 20px;
        text-align: right;
      }

      button {
        padding: 12px 20px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn-add {
        background-color: #28a745;
        color: white;
      }

      .btn-add:hover {
        background-color: #218838;
        transform: scale(1.05);
      }

      .btn-delete {
        background-color: #dc3545;
        color: white;
        padding: 7px 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>📦 Inventaris Toko</h2>

      <div class="btn-group">
        <button class="btn-add" onclick="inputProdukBaru()">
          ➕ Tambah Produk Baru
        </button>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nama Produk</th>
            <th>Harga</th>
            <th>Stok</th>
            <th style="width: 100px">Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelBody"></tbody>
      </table>
    </div>

    <script>
      let produkToko = [
        { id: 1, nama: "Laptop", harga: 15000000, stok: 5 },
        { id: 2, nama: "Mouse Wireless", harga: 350000, stok: 10 },
        { id: 3, nama: "Keyboard Mechanical", harga: 1200000, stok: 7 },
      ];

      function updateTampilanTabel() {
        const tabelBody = document.getElementById("tabelBody");
        tabelBody.innerHTML = "";

        if (produkToko.length === 0) {
          tabelBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">Data produk kosong.</td></tr>`;
          return;
        }

        produkToko.forEach((produk) => {
          let row = `<tr>
                <td><b>#${produk.id}</b></td>
                <td>${produk.nama}</td>
                <td>Rp${produk.harga.toLocaleString("id-ID")}</td>
                <td>${produk.stok} unit</td>
                <td>
                    <button class="btn-delete" onclick="hapusProduk(${produk.id}, '${produk.nama}')">🗑️ Hapus</button>
                </td>
            </tr>`;
          tabelBody.innerHTML += row;
        });
      }

      function inputProdukBaru() {
        let nama = prompt("Masukkan Nama Produk:");
        if (!nama) return;

        let harga = parseInt(prompt(`Masukkan Harga untuk ${nama} (Angka saja):`));
        let stok = parseInt(prompt(`Masukkan Jumlah Stok untuk ${nama}:`));

        if (!isNaN(harga) && !isNaN(stok) && harga > 0 && stok >= 0) {
          const maxId = produkToko.length > 0 ? Math.max(...produkToko.map((p) => p.id)) : 0;
          produkToko.push({ id: maxId + 1, nama, harga, stok });
          updateTampilanTabel();
        } else {
          alert("Input tidak valid!");
        }
      }

      function hapusProduk(id, nama) {
        if (confirm(`Hapus produk "${nama}"?`)) {
          produkToko = produkToko.filter((p) => p.id !== id);
          updateTampilanTabel();
        }
      }

      updateTampilanTabel();
    </script>
  </body>
</html>
